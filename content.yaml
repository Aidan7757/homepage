# Grouped by organization; each org can list multiple roles.
research:
  - org: Technical University of Munich
    roles:
      - role: Computational Geophysics Visiting Researcher
        dates: 07/2025 - 08/2025
        desc: Built coupled tsunami-landslide simulations in Peano4 with Python and C++ using finite-volume and ADER-DG solvers.
  - org: Virginia Tech
    roles:
      - role: Inverse Problem Undergraduate Researcher
        dates: 01/2025 - 06/2026
        desc: Solved inverse problems for the FitzHugh-Nagumo and Hodgkin-Huxley models with PyTorch neural networks at 97%+ accuracy.
      - role: Machine Learning Dimensionality Reduction Undergraduate Researcher
        dates: 08/2024 - 06/2026
        desc: Built autoencoder methods to compress ODE inputs for inverse-problem networks, reaching 99%+ parameter accuracy.
      - role: Code Generation Toolkit Undergraduate Researcher
        dates: 09/2023 - 07/2025
        desc: Built a Python code-generation toolkit that cut Flash-X hardware-variant code by 72% with Argonne National Lab.
  - org: James Madison University
    roles:
      - role: Jet Breakaway and Fluid Stream Modeling Undergraduate Researcher
        dates: 02/2023 - 05/2023
        desc: Modeled a Coanda wall-jet stream in MATLAB to study jet breakaway, presented at an MAA conference.

professional:
  - org: Marriott International
    roles:
      - role: Associate Software Engineer
        dates: 08/2024 - 06/2026
        desc: Enhanced the provisioning automation microservice and shipped its UI via Harness to all Marriott developers.
      - role: Core Platform Software Engineering Intern
        dates: 06/2024 - 08/2024
        desc: Built a SpringBoot WebFlux microservice automating API provisioning, cutting a 30+ action process to 4.

